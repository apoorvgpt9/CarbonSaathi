{% extends "base.html" %}
{% block title %}Log activity · CarbonSaathi{% endblock %}
{% block content %}
  <section class="mx-auto max-w-2xl">
    <h1 class="text-2xl font-semibold text-slate-900">Log an activity</h1>
    <p class="mt-2 text-sm text-slate-600">
      Plain English works. Examples: <em>"Auto rickshaw 6 km"</em>,
      <em>"AC 4 hours yesterday"</em>, <em>"Two veg thalis at lunch"</em>.
    </p>

    <form id="log-form" class="mt-6 space-y-4">
      <div>
        <label for="log-input" class="block text-sm font-medium text-slate-700"
          >What did you do?</label
        >
        <textarea
          id="log-input"
          name="raw_input"
          required
          minlength="1"
          maxlength="500"
          rows="3"
          class="mt-1 block w-full rounded-md border-slate-300 px-3 py-2 text-sm shadow-sm focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500"
        ></textarea>
      </div>
      <button
        type="submit"
        class="inline-flex items-center justify-center rounded-md bg-emerald-600 px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-emerald-700 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:ring-offset-2"
      >
        Log it
      </button>
    </form>

    <div
      id="activity-result"
      role="status"
      aria-live="polite"
      class="mt-6 space-y-3"
    ></div>
  </section>
  <script type="module" defer src="/static/js/log_page.js"></script>
{% endblock %}
