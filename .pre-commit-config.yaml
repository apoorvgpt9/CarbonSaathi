minimum_pre_commit_version: "3.5.0"

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.18
    hooks:
      - id: ruff
        args: ["--fix"]

  - repo: https://github.com/psf/black
    rev: 26.5.1
    hooks:
      - id: black

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        args: ["--config-file=pyproject.toml"]
        additional_dependencies:
          # Production deps that app/ imports directly
          - "fastapi==0.137.2"
          - "pydantic==2.13.4"
          - "pydantic-settings==2.14.1"
          - "structlog==26.1.0"
          - "slowapi==0.1.10"
          - "secure==2.0.1"
          - "httpx==0.28.1"
          # Test deps (mypy checks tests/ files on commit too)
          - "pytest==9.1.0"
          - "pytest-asyncio==1.4.0"
          # Runtime deps needed by pydantic[email] and firestore during type-check
          - "email-validator>=2.0.0"
          - "google-cloud-firestore>=2.17.0"
          # Type stubs
          - "types-requests==2.33.0.20260518"

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml", "-r", "app"]
        additional_dependencies: ["bandit[toml]"]
