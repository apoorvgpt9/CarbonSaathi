name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege: only read repo contents
permissions:
  contents: read

# Cancel stale runs when a new push arrives on the same ref
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13.7"

jobs:
  # Enforce ruff and black formatting/style rules
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Upgrade pip
        run: python3 -m pip install --upgrade pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: ruff check
        run: ruff check .

      - name: black check
        run: black --check .

  # Verify strict type correctness across app/
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Upgrade pip
        run: python3 -m pip install --upgrade pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: mypy
        run: mypy app --strict

  # Run test suite; fail if coverage drops below 95%
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Upgrade pip
        run: python3 -m pip install --upgrade pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: pytest
        env:
          # Dummy, non-secret values so module-level get_settings() (e.g.
          # app.core.ratelimit) can construct Settings during test collection
          # when no .env file is present. The autouse _test_env fixture
          # overrides these per test; no real secrets are used in CI.
          GEMINI_API_KEY: test-gemini-key
          FIREBASE_PROJECT_ID: test-project
          FIREBASE_API_KEY: test-fb-api-key
          FIREBASE_AUTH_DOMAIN: test.firebaseapp.com
          FIREBASE_APP_ID: "1:test:web:test"
        run: pytest -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: htmlcov/

  # Static security analysis and dependency vulnerability scan
  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Upgrade pip
        run: python3 -m pip install --upgrade pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: bandit
        run: bandit -c pyproject.toml -r app

      - name: pip-audit
        run: pip-audit

  # Verify Docker image builds successfully (no push)
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: carbonsaathi:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Aggregates all job results into a single branch-protection status check
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, security, docker]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          results="${{ needs.lint.result }} ${{ needs.typecheck.result }} ${{ needs.test.result }} ${{ needs.security.result }} ${{ needs.docker.result }}"
          echo "Job results: $results"
          for result in $results; do
            if [ "$result" != "success" ]; then
              echo "CI FAILED — one or more jobs did not succeed."
              exit 1
            fi
          done
          echo "CI PASSED — all jobs succeeded."
